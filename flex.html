<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Uygulaması</title>
    <link rel="stylesheet" href="flex.css">
</head>
<body>
    <div class="wrapper">
        <nav class="navbar">
            <div class="logo">LOGO</div>
            <ul class="nav-links">
                <li><a href="#">Ana Sayfa</a></li>
                <li><a href="#">Hakkında</a></li>
                <li><a href="#">Dersler</a></li>
                <li><a href="#">İletişim</a></li>
            </ul>
        </nav>

        <section class="hero">
            <div class="hero-content">
                <h1>Hero Başlık</h1>
                <p>Açıklama metni buraya gelecek.</p>
                <button>Buton</button>
            </div>
            <div class="hero-image-placeholder">Görsel Kutusu</div>
        </section>

        <section class="cards-container">
            <div class="card">Kart 1</div>
            <div class="card">Kart 2</div>
            <div class="card">Kart 3</div>
            <div class="card">Kart 4</div>
            <div class="card">Kart 5</div>
            <div class="card">Kart 6</div>
        </section>

        <section class="grow-section">
            <div class="box box-1">Kutu 1 (Grow: 1)</div>
            <div class="box box-2">Kutu 2 (Grow: 2)</div>
            <div class="box box-3">Kutu 3 (Grow: 1)</div>
        </section>

        <footer class="flex-footer">
            <p>© 2026 - Temel Flexbox Örneği</p>
        </footer>
    </div>
</body>
</html>
